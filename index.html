<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Conduit - Trace</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080705; overflow: hidden; touch-action: none; cursor: pointer; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
/** CONFIG **/
const TILE = 42, LW = 16;
const C_BG = '#080705';

const QW = 24, QH = 28;
const COLS = 2 * QW + 1;
const ROWS = 2 * QH + 1;
const MIDX = QW, MIDY = QH;

/** PALETTE **/
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
}
let RGB_GLOW, RGB_CORE, RGB_FAR_GLOW, RGB_FAR_CORE;
function rerollPalette() {
  const HUE     = Math.random() * 360;
  const FAR_HUE = (HUE + 80 + Math.random() * 130) % 360;
  RGB_GLOW     = hslToRgb(HUE,     65,  58);
  RGB_CORE     = hslToRgb(HUE,     100, 72);
  RGB_FAR_GLOW = hslToRgb(FAR_HUE, 65,  58);
  RGB_FAR_CORE = hslToRgb(FAR_HUE, 100, 72);
}
rerollPalette();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let edges = [], charge = 0, maxDist = 0;
let isHolding = false, waveTimer = 0, pulseEnvelope = 0;
let lastTime = null, fullyCharged = false;
const CHARGE_SPEED = 22;

/** NOISE **/
function hash21(x, y) {
  let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
  return h - Math.floor(h);
}
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
  const a = hash21(ix,     iy    ), b = hash21(ix + 1, iy    );
  const c = hash21(ix,     iy + 1), d = hash21(ix + 1, iy + 1);
  return a + (b - a) * ux + (c - a) * uy + ((a - b - c + d) * ux * uy);
}
function fbm(x, y, octaves = 4) {
  let v = 0, amp = 0.5, freq = 1, total = 0;
  for (let i = 0; i < octaves; i++) {
    v += smoothNoise(x * freq, y * freq) * amp;
    total += amp; amp *= 0.5; freq *= 2.1;
  }
  return v / total;
}

/** GENERATION **/
function generate() {
  edges = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => ({ T: false, R: false, B: false, L: false, dist: Infinity, active: false }))
  );

  const rawActive = Array.from({ length: QH }, () => Array(QW).fill(false));
  const qActive   = Array.from({ length: QH }, () => Array(QW).fill(false));

  const nx = Math.random() * 100, ny = Math.random() * 100;
  const extentR = 0.45 + Math.random() * 0.45;
  const extentC = 0.45 + Math.random() * 0.45;
  const biasR = (Math.random() - 0.5) * 0.3;
  const biasC = (Math.random() - 0.5) * 0.3;
  const angle = Math.random() * Math.PI;
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  const warpStrength = 0.45 + Math.random() * 0.55;
  const warpScale    = 1.8  + Math.random() * 2.5;
  const shapePow     = 0.7  + Math.random() * 0.7;

  for (let r = 0; r < QH; r++) {
    for (let c = 0; c < QW; c++) {
      const nr = (r / (QH - 1) - 0.5) * 2 + biasR;
      const nc = (c / (QW - 1) - 0.5) * 2 + biasC;
      const rr = nr * cosA - nc * sinA;
      const rc = nr * sinA + nc * cosA;
      const ellipseDist = Math.pow(Math.pow(Math.abs(rr / extentR), shapePow) + Math.pow(Math.abs(rc / extentC), shapePow), 1 / shapePow) * 0.78;
      const warp = fbm(c / QW * warpScale + nx, r / QH * warpScale + ny) * 2 - 1;
      rawActive[r][c] = ellipseDist + warp * warpStrength < 1.0;
    }
  }

  // Tendrils
  const numTendrils = 2 + Math.floor(Math.random() * 5);
  for (let i = 0; i < numTendrils; i++) {
    let sr = -1, sc = -1;
    for (let attempt = 0; attempt < 200; attempt++) {
      const tr = Math.floor(Math.random() * QH), tc = Math.floor(Math.random() * QW);
      if (rawActive[tr][tc]) { sr = tr; sc = tc; break; }
    }
    if (sr < 0) continue;
    const len = 3 + Math.floor(Math.random() * Math.min(QW, QH) * 0.5);
    const dr = (Math.random() - 0.5) * 2, dc = (Math.random() - 0.5) * 2;
    const dlen = Math.sqrt(dr * dr + dc * dc);
    for (let s = 0; s < len; s++) {
      const tr = Math.round(sr + (dr / dlen) * s), tc = Math.round(sc + (dc / dlen) * s);
      if (tr >= 0 && tr < QH && tc >= 0 && tc < QW) rawActive[tr][tc] = true;
    }
  }

  function fillDisc(r0, c0, rad) {
    const ri = Math.ceil(rad);
    for (let dr = -ri; dr <= ri; dr++) {
      for (let dc = -ri; dc <= ri; dc++) {
        if (dr * dr + dc * dc <= rad * rad) {
          const nr = r0 + dr, nc = c0 + dc;
          if (nr >= 0 && nr < QH && nc >= 0 && nc < QW) rawActive[nr][nc] = true;
        }
      }
    }
  }
  function drawCorridor(r1, c1, r2, c2, w) {
    const steps = Math.max(Math.abs(r2 - r1), Math.abs(c2 - c1));
    if (steps === 0) return;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      fillDisc(Math.round(r1 + (r2 - r1) * t), Math.round(c1 + (c2 - c1) * t), w);
    }
  }

  const anchor = { r: QH - 1, c: QW - 1 };
  fillDisc(anchor.r, anchor.c, 2 + Math.random() * 4);

  const numLobes = 3 + Math.floor(Math.random() * 7);
  const lobes = [];
  for (let i = 0; i < numLobes; i++)
    lobes.push({ r: Math.floor(Math.random() * QH), c: Math.floor(Math.random() * QW), rad: 1 + Math.random() * 6 });
  for (const b of lobes) {
    fillDisc(b.r, b.c, b.rad);
    drawCorridor(anchor.r, anchor.c, b.r, b.c, 0.5 + Math.random() * 1.4);
  }
  for (let i = 0; i < lobes.length - 1; i++) {
    if (Math.random() < 0.5) {
      const j = i + 1 + Math.floor(Math.random() * (lobes.length - i - 1));
      drawCorridor(lobes[i].r, lobes[i].c, lobes[j].r, lobes[j].c, 0.4 + Math.random() * 1.0);
    }
  }

  // BFS connectivity from anchor
  const fq = [[QH - 1, QW - 1]];
  qActive[QH - 1][QW - 1] = true;
  while (fq.length) {
    const [r, c] = fq.shift();
    [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr, dc]) => {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < QH && nc >= 0 && nc < QW && rawActive[nr][nc] && !qActive[nr][nc]) {
        qActive[nr][nc] = true; fq.push([nr, nc]);
      }
    });
  }
  qActive[QH - 1][QW - 1] = true;

  // Spanning-tree maze
  const qEdges = Array.from({ length: QH }, () =>
    Array.from({ length: QW }, () => ({ T: false, R: false, B: false, L: false }))
  );
  const visited = Array.from({ length: QH }, () => Array(QW).fill(false));
  const stack = [[QH - 1, QW - 1]];
  visited[QH - 1][QW - 1] = true;
  while (stack.length) {
    const [r, c] = stack[stack.length - 1];
    const dirs = [[-1,0,'T','B'],[1,0,'B','T'],[0,-1,'L','R'],[0,1,'R','L']].sort(() => Math.random() - 0.5);
    let moved = false;
    for (const [dr, dc, s, o] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < QH && nc >= 0 && nc < QW && qActive[nr][nc] && !visited[nr][nc]) {
        visited[nr][nc] = true;
        qEdges[r][c][s] = qEdges[nr][nc][o] = true;
        stack.push([nr, nc]); moved = true; break;
      }
    }
    if (!moved) stack.pop();
  }

  // Mirror all 4 quadrants perfectly
  for (let r = 0; r < QH; r++) {
    for (let c = 0; c < QW; c++) {
      if (!qActive[r][c]) continue;
      const e = qEdges[r][c];
      const mirror = (row, col, cfg) => {
        edges[row][col].active = true;
        edges[row][col].T = cfg.T; edges[row][col].R = cfg.R;
        edges[row][col].B = cfg.B; edges[row][col].L = cfg.L;
      };
      mirror(r, c, e);
      mirror(r, MIDX + 1 + (QW - 1 - c), { T: e.T, R: e.L, B: e.B, L: e.R });
      mirror(MIDY + 1 + (QH - 1 - r), c, { T: e.B, R: e.R, B: e.T, L: e.L });
      mirror(MIDY + 1 + (QH - 1 - r), MIDX + 1 + (QW - 1 - c), { T: e.B, R: e.L, B: e.T, L: e.R });
    }
  }

  edges[MIDY][MIDX].active = true;
  edges[MIDY][MIDX].dist = 0;

  if (qActive[QH - 1][QW - 1]) {
    edges[MIDY][MIDX].T = edges[MIDY][MIDX].L = true;
    edges[MIDY - 1][MIDX].B = edges[MIDY - 1][MIDX].active = true;
    edges[MIDY][MIDX - 1].R = edges[MIDY][MIDX - 1].active = true;
    edges[MIDY][MIDX].R = true;
    edges[MIDY][MIDX + 1].L = edges[MIDY][MIDX + 1].active = true;
    edges[MIDY][MIDX].B = true;
    edges[MIDY + 1][MIDX].T = edges[MIDY + 1][MIDX].active = true;
  }

  for (let r = 0; r < QH; r++) {
    if (!qActive[r][QW - 1]) continue;
    const prevOn = r > 0    && qActive[r - 1][QW - 1];
    const nextOn = r < QH-1 && qActive[r + 1][QW - 1];
    if (prevOn && nextOn) continue;
    edges[r][MIDX - 1].R = edges[r][MIDX].L = true;
    edges[r][MIDX].R = edges[r][MIDX + 1].L = true;
    edges[r][MIDX].active = true;
    const mirR = MIDY + 1 + (QH - 1 - r);
    edges[mirR][MIDX - 1].R = edges[mirR][MIDX].L = true;
    edges[mirR][MIDX].R = edges[mirR][MIDX + 1].L = true;
    edges[mirR][MIDX].active = true;
  }
  for (let c = 0; c < QW; c++) {
    if (!qActive[QH - 1][c]) continue;
    const prevOn = c > 0    && qActive[QH - 1][c - 1];
    const nextOn = c < QW-1 && qActive[QH - 1][c + 1];
    if (prevOn && nextOn) continue;
    edges[MIDY - 1][c].B = edges[MIDY][c].T = true;
    edges[MIDY][c].B = edges[MIDY + 1][c].T = true;
    edges[MIDY][c].active = true;
    const mirC = MIDX + 1 + (QW - 1 - c);
    edges[MIDY - 1][mirC].B = edges[MIDY][mirC].T = true;
    edges[MIDY][mirC].B = edges[MIDY + 1][mirC].T = true;
    edges[MIDY][mirC].active = true;
  }

  // BFS distances from hub
  const queue = [[MIDY, MIDX]];
  maxDist = 0;
  while (queue.length > 0) {
    const [r, c] = queue.shift();
    const curr = edges[r][c];
    for (const n of [{dr:-1,dc:0,s:'T',o:'B'},{dr:1,dc:0,s:'B',o:'T'},{dr:0,dc:-1,s:'L',o:'R'},{dr:0,dc:1,s:'R',o:'L'}]) {
      const nr = r + n.dr, nc = c + n.dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
          edges[nr][nc].active && curr[n.s] && edges[nr][nc][n.o] && edges[nr][nc].dist === Infinity) {
        edges[nr][nc].dist = curr.dist + 1;
        maxDist = Math.max(maxDist, edges[nr][nc].dist);
        queue.push([nr, nc]);
      }
    }
  }
}

/** DRAWING **/
function addTilePath(e, r, c) {
  const px = c * TILE, py = r * TILE;
  const cx = px + TILE / 2, cy = py + TILE / 2;
  const arms = (e.T?1:0) + (e.R?1:0) + (e.B?1:0) + (e.L?1:0);
  if (arms === 2 && !((e.T && e.B) || (e.L && e.R))) {
    if      (e.T && e.R) { ctx.moveTo(cx, py);        ctx.lineTo(cx, cy); ctx.lineTo(px+TILE, cy); }
    else if (e.R && e.B) { ctx.moveTo(px+TILE, cy);   ctx.lineTo(cx, cy); ctx.lineTo(cx, py+TILE); }
    else if (e.B && e.L) { ctx.moveTo(cx, py+TILE);   ctx.lineTo(cx, cy); ctx.lineTo(px, cy); }
    else if (e.L && e.T) { ctx.moveTo(px, cy);        ctx.lineTo(cx, cy); ctx.lineTo(cx, py); }
  } else {
    if (e.T) { ctx.moveTo(cx, py);        ctx.lineTo(cx, cy); }
    if (e.R) { ctx.moveTo(px + TILE, cy); ctx.lineTo(cx, cy); }
    if (e.B) { ctx.moveTo(cx, py + TILE); ctx.lineTo(cx, cy); }
    if (e.L) { ctx.moveTo(px, cy);        ctx.lineTo(cx, cy); }
  }
}

function draw() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();

  const fitScale = Math.min(canvas.height / (ROWS * TILE), canvas.width / (COLS * TILE)) * 0.95;
  const hX = MIDX * TILE + TILE / 2, hY = MIDY * TILE + TILE / 2;
  ctx.translate(canvas.width / 2 - hX * fitScale, canvas.height / 2 - hY * fitScale);
  ctx.scale(fitScale, fitScale);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const now = Date.now();
  const pInt = pulseEnvelope * (0.5 - Math.cos(waveTimer * 0.08) * 0.5);

  const rHub = Math.floor(RGB_GLOW.r + (RGB_CORE.r - RGB_GLOW.r) * pInt);
  const gHub = Math.floor(RGB_GLOW.g + (RGB_CORE.g - RGB_GLOW.g) * pInt);
  const bHub = Math.floor(RGB_GLOW.b + (RGB_CORE.b - RGB_GLOW.b) * pInt);
  const currentColor = `rgb(${rHub},${gHub},${bHub})`;

  const rFar = Math.floor(RGB_FAR_GLOW.r + (RGB_FAR_CORE.r - RGB_FAR_GLOW.r) * pInt);
  const gFar = Math.floor(RGB_FAR_GLOW.g + (RGB_FAR_CORE.g - RGB_FAR_GLOW.g) * pInt);
  const bFar = Math.floor(RGB_FAR_GLOW.b + (RGB_FAR_CORE.b - RGB_FAR_GLOW.b) * pInt);
  const farColor = `rgb(${rFar},${gFar},${bFar})`;

  const hubWhite = Math.floor(200 + 55 * ((Math.sin(now / 700) + 1) / 2));
  const hubPulseColor = `rgb(${hubWhite},${hubWhite},${hubWhite})`;

  const gradRadius = Math.sqrt((ROWS * TILE) ** 2 + (COLS * TILE) ** 2) * 0.5;
  const lineGrad = ctx.createRadialGradient(hX, hY, 0, hX, hY, gradRadius);
  lineGrad.addColorStop(0,    currentColor);
  lineGrad.addColorStop(0.12, currentColor);
  lineGrad.addColorStop(1,    farColor);

  const baseAlpha = 0.85 + pInt * 0.15;
  ctx.globalAlpha = baseAlpha;
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth   = LW + pInt * 8;
  ctx.shadowColor = currentColor;
  ctx.shadowBlur  = 14 + pInt * 22;
  ctx.beginPath();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const e = edges[r][c];
      if (!e.active || e.dist > charge || (r === MIDY && c === MIDX)) continue;
      addTilePath(e, r, c);
    }
  }
  ctx.stroke();

  ctx.shadowBlur = 38;
  const leadingTiles = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const e = edges[r][c];
      if (!e.active || e.dist <= charge || e.dist > charge + 1 || (r === MIDY && c === MIDX)) continue;
      const edgeFraction = charge - e.dist + 1;
      leadingTiles.push({ e, r, c, edgeFraction });
      ctx.globalAlpha = baseAlpha * edgeFraction;
      ctx.beginPath(); addTilePath(e, r, c); ctx.stroke();
    }
  }

  if (charge > 0 && charge < maxDist) {
    ctx.shadowBlur = 0;
    for (const { r, c, edgeFraction } of leadingTiles) {
      const tx = c * TILE + TILE / 2, ty = r * TILE + TILE / 2;
      const dotR = LW * 0.75;
      const dotGlow = ctx.createRadialGradient(tx, ty, 0, tx, ty, dotR * 3);
      dotGlow.addColorStop(0,   `rgba(255,255,255,${0.95 * edgeFraction})`);
      dotGlow.addColorStop(0.3, `rgba(255,255,255,${0.5  * edgeFraction})`);
      dotGlow.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = dotGlow;
      ctx.shadowColor = 'white'; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(tx, ty, dotR * 3, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.globalAlpha = edgeFraction;
      ctx.beginPath(); ctx.arc(tx, ty, dotR * 0.55, 0, Math.PI * 2); ctx.fill();
    }
  }

  ctx.globalAlpha = 1;
  const hubPulse = 1.3 + Math.sin(now / 420) * 0.35 * (isHolding ? 1.6 : 1);
  const grd = ctx.createRadialGradient(hX, hY, 0, hX, hY, TILE * hubPulse * 1.6);
  grd.addColorStop(0, 'rgba(255,255,255,0.45)');
  grd.addColorStop(0.4, 'rgba(255,255,255,0.08)');
  grd.addColorStop(1, 'transparent');
  ctx.shadowBlur = 0;
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(hX, hY, TILE * hubPulse * 1.6, 0, Math.PI * 2); ctx.fill();

  ctx.globalAlpha = 0.25 + Math.sin(now / 280) * 0.15;
  ctx.strokeStyle = hubPulseColor;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = hubPulseColor; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(hX, hY, TILE * 0.55, 0, Math.PI * 2); ctx.stroke();

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 28 + pInt * 18;
  ctx.fillStyle = hubPulseColor; ctx.shadowColor = hubPulseColor;
  ctx.beginPath(); ctx.arc(hX, hY, LW * 1.1, 0, Math.PI * 2); ctx.fill();

  ctx.restore();

  const vx = canvas.width / 2, vy = canvas.height / 2;
  const vr = Math.max(canvas.width, canvas.height) * 0.78;
  const vig = ctx.createRadialGradient(vx, vy, vr * 0.18, vx, vy, vr);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.62)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/** INPUT **/
window.addEventListener('mousedown',  () => isHolding = true);
window.addEventListener('mouseup',    () => isHolding = false);
window.addEventListener('touchstart', e => { e.preventDefault(); isHolding = true; }, { passive: false });
window.addEventListener('touchend',   () => isHolding = false);

/** LOOP **/
function update(timestamp) {
  const dt = lastTime !== null ? Math.min((timestamp - lastTime) / 1000, 0.1) : 0;
  lastTime = timestamp;

  if (isHolding) {
    charge = Math.min(charge + CHARGE_SPEED * dt, maxDist);
  } else {
    charge = Math.max(charge - CHARGE_SPEED * 2 * dt, 0);
  }

  if (charge >= maxDist) {
    fullyCharged = true;
    waveTimer++;
    pulseEnvelope = Math.min(pulseEnvelope + 0.015, 1);
  } else {
    pulseEnvelope = Math.max(pulseEnvelope - 0.03, 0);
    if (!isHolding) waveTimer = 0;
    if (fullyCharged && charge <= 0) {
      fullyCharged = false;
      rerollPalette();
      generate();
    }
  }

  draw();
  requestAnimationFrame(update);
}

function init() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  charge = 0; fullyCharged = false;
  generate();
}

init();
requestAnimationFrame(update);
window.addEventListener('resize', init);
</script>
</body>
</html>
